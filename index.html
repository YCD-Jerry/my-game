<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Map Explorer</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #4a7c3f; }
    canvas { display: block; }

    /* ── Settings UI ─────────────────────────────────────────────── */
    #settingsBtn {
      position: fixed; top: 12px; right: 12px; z-index: 20;
      width: 42px; height: 42px; border-radius: 50%;
      border: 1px solid rgba(255,255,255,0.18);
      background: rgba(18,18,20,0.88); color: #ffd84d;
      font-size: 20px; line-height: 1; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: transform .2s, background .2s;
      font-family: -apple-system,"SF Pro Display",system-ui,"Segoe UI",Roboto,Arial,sans-serif;
    }
    #settingsBtn:hover { background: rgba(40,40,44,0.95); transform: rotate(45deg); }

    #bagBtn {
      position: fixed; top: 12px; right: 62px; z-index: 20;
      width: 42px; height: 42px; border-radius: 50%;
      border: 1px solid rgba(255,255,255,0.18);
      background: rgba(18,18,20,0.88); color: #ffd84d;
      font-size: 20px; line-height: 1; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: transform .2s, background .2s;
      font-family: -apple-system,"SF Pro Display",system-ui,"Segoe UI",Roboto,Arial,sans-serif;
    }
    #bagBtn:hover { background: rgba(40,40,44,0.95); transform: scale(1.1); }

    #achBtn {
      position: fixed; top: 12px; right: 112px; z-index: 20;
      width: 42px; height: 42px; border-radius: 50%;
      border: 1px solid rgba(255,255,255,0.18);
      background: rgba(18,18,20,0.88); color: #ffd84d;
      font-size: 20px; line-height: 1; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: transform .2s, background .2s;
      font-family: -apple-system,"SF Pro Display",system-ui,"Segoe UI",Roboto,Arial,sans-serif;
    }
    #achBtn:hover { background: rgba(40,40,44,0.95); transform: scale(1.1); }

    /* ── Achievement modal ───────────────────────────────────────── */
    #achModal {
      position: fixed; inset: 0; z-index: 30;
      background: rgba(0,0,0,0.5);
      display: flex; align-items: center; justify-content: center;
      font-family: -apple-system,"SF Pro Display",system-ui,"Segoe UI",Roboto,Arial,sans-serif;
    }
    #achModal.hidden { display: none; }
    #achPanel {
      width: 400px; max-width: 94vw; max-height: 82vh; overflow-y: auto;
      background: rgba(18,18,22,0.98); color: #f0f0f2;
      border: 1px solid rgba(255,216,77,0.25); border-radius: 18px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.7);
      font-family: inherit; overflow: hidden; display: flex; flex-direction: column;
    }
    #achHeader {
      padding: 18px 22px 12px;
      background: linear-gradient(180deg, rgba(255,216,77,0.08) 0%, transparent 100%);
      border-bottom: 1px solid rgba(255,216,77,0.15);
    }
    #achHeader h2 { font-size: 18px; font-weight: 700; color: #ffd84d; margin: 0 0 2px; }
    #achSubtitle { font-size: 12px; color: #888; }
    #achList { overflow-y: auto; padding: 12px 0; flex: 1; }
    #achList::-webkit-scrollbar { width: 4px; }
    #achList::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 2px; }
    .ach-row {
      display: flex; align-items: center; gap: 14px;
      padding: 12px 22px; border-bottom: 1px solid rgba(255,255,255,0.05);
      transition: background .15s;
    }
    .ach-row:last-child { border-bottom: 0; }
    .ach-row:hover { background: rgba(255,255,255,0.03); }
    .ach-icon {
      width: 42px; height: 42px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 20px; flex: 0 0 auto;
      border: 2px solid rgba(255,255,255,0.12);
      background: rgba(255,255,255,0.05);
    }
    .ach-icon.done { border-color: #ffd84d; background: rgba(255,216,77,0.12); }
    .ach-info { flex: 1; min-width: 0; }
    .ach-name { font-size: 14px; font-weight: 600; margin-bottom: 2px; }
    .ach-name.done { color: #ffd84d; }
    .ach-name.locked { color: #666; }
    .ach-desc { font-size: 11px; color: #888; margin-bottom: 6px; }
    .ach-bar-wrap { height: 4px; background: rgba(255,255,255,0.1); border-radius: 2px; overflow: hidden; }
    .ach-bar { height: 100%; border-radius: 2px; background: linear-gradient(90deg, #ffd84d, #ffb020); transition: width .4s; }
    .ach-progress { font-size: 10px; color: #888; margin-top: 3px; }
    .ach-done-stamp { font-size: 11px; color: #ffd84d; font-weight: 600; white-space: nowrap; }
    #achCloseBtn {
      margin: 0 22px 16px; padding: 10px; border: 0; border-radius: 10px;
      cursor: pointer; background: rgba(255,255,255,0.1); color: #f0f0f2;
      font-size: 14px; font-weight: 600; font-family: inherit;
    }
    #achCloseBtn:hover { background: rgba(255,255,255,0.18); }

    /* ── Achievement unlock notification (bottom, Genshin-style) ─── */
    #achNotif {
      position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%) translateY(140%);
      z-index: 9999; min-width: 260px; max-width: 90vw;
      background: linear-gradient(135deg, rgba(30,28,20,0.98), rgba(24,22,16,0.98));
      border: 1px solid rgba(255,216,77,0.5); border-radius: 12px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.7), inset 0 0 0 1px rgba(255,216,77,0.1);
      display: flex; align-items: center; gap: 12px; padding: 12px 18px;
      font-family: -apple-system,"SF Pro Display",system-ui,"Segoe UI",Roboto,Arial,sans-serif;
      transition: transform .4s cubic-bezier(.34,1.56,.64,1), opacity .3s;
      opacity: 0; pointer-events: none;
    }
    #achNotif.show { transform: translateX(-50%) translateY(0); opacity: 1; }
    #achNotifIcon { font-size: 28px; flex: 0 0 auto; }
    #achNotifText { flex: 1; }
    #achNotifLabel { font-size: 10px; color: #ffd84d; font-weight: 700; letter-spacing: .1em; text-transform: uppercase; margin-bottom: 2px; }
    #achNotifName  { font-size: 14px; font-weight: 700; color: #fff; }
    #achNotifDesc  { font-size: 11px; color: #a0a090; margin-top: 1px; }

    /* ── Drift bottle note ───────────────────────────────────────── */
    #driftModal {
      position: fixed; inset: 0; z-index: 9990;
      background: rgba(0,0,0,0.55);
      display: flex; align-items: center; justify-content: center;
      font-family: -apple-system,"SF Pro Display",system-ui,"Segoe UI",Roboto,Arial,sans-serif;
    }
    #driftModal.hidden { display: none; }
    #driftPanel {
      width: 300px; max-width: 88vw;
      background: #f5e9c8; color: #3a2800;
      border: 2px solid #c8a870; border-radius: 6px;
      box-shadow: 0 8px 30px rgba(0,0,0,0.5), inset 0 0 40px rgba(180,140,60,0.15);
      padding: 28px 26px 20px; transform: rotate(-1.5deg);
    }
    #driftPanel h3 { font-size: 14px; font-weight: 700; color: #8a5c00; margin-bottom: 16px; text-align: center; letter-spacing: .05em; }
    #driftMsgBody {
      font-size: 18px; font-weight: 600; text-align: center;
      line-height: 1.6; color: #3a2800;
      border-top: 1px dashed #c8a870; border-bottom: 1px dashed #c8a870;
      padding: 14px 0; margin-bottom: 16px;
    }
    #driftCloseBtn {
      display: block; width: 100%; padding: 8px; border: 1px solid #c8a870;
      border-radius: 6px; background: rgba(180,140,60,0.2); color: #6a4000;
      cursor: pointer; font-size: 13px; font-weight: 600; font-family: inherit;
      text-align: center;
    }
    #driftCloseBtn:hover { background: rgba(180,140,60,0.35); }

    /* ── Notification layer (above ALL modals) ───────────────────── */
    #notifLayer {
      position: fixed; top: 64px; left: 50%; transform: translateX(-50%);
      z-index: 9999; pointer-events: none; text-align: center;
      font-family: -apple-system,"SF Pro Display",system-ui,"Segoe UI",Roboto,Arial,sans-serif;
    }
    #notifBox {
      display: inline-block; padding: 10px 22px; border-radius: 12px;
      background: rgba(22,22,26,0.97); color: #ffd84d;
      border: 1px solid rgba(255,216,77,0.4);
      font-size: 14px; font-weight: 600;
      box-shadow: 0 4px 20px rgba(0,0,0,0.5);
      transition: opacity .25s; opacity: 1;
      white-space: nowrap;    /* shrink-wrap to text length */
      max-width: 90vw;        /* but never overflow screen */
      overflow: hidden; text-overflow: ellipsis;
    }
    #notifBox.hidden { opacity: 0; pointer-events: none; }

    /* ── Quantity stepper (shared by shop + cook) ────────────────── */
    .qty-row { display: flex; align-items: center; gap: 4px; flex: 0 0 auto; }
    .qty-row button {
      width: 24px; height: 24px; border: 1px solid rgba(255,255,255,0.2);
      border-radius: 6px; background: rgba(255,255,255,0.08); color: #f0f0f2;
      font-size: 15px; cursor: pointer; padding: 0; line-height: 1;
    }
    .qty-row button:hover { background: rgba(255,255,255,0.16); }
    .qty-num {
      width: 32px; text-align: center; font-size: 13px; font-weight: 600;
      color: #ffd84d; user-select: none;
    }

    #settingsModal {
      position: fixed; inset: 0; z-index: 30;
      background: rgba(0,0,0,0.45);
      display: flex; align-items: center; justify-content: center;
      font-family: -apple-system,"SF Pro Display",system-ui,"Segoe UI",Roboto,Arial,sans-serif;
    }
    #settingsModal.hidden { display: none; }

    #settingsPanel {
      width: 320px; max-width: 90vw;
      background: rgba(24,24,27,0.98); color: #f0f0f2;
      border: 1px solid rgba(255,255,255,0.12); border-radius: 16px;
      padding: 20px 22px; box-shadow: 0 16px 50px rgba(0,0,0,0.5);
    }
    #settingsPanel h2 { font-size: 18px; margin-bottom: 16px; color: #ffd84d; font-weight: 600; }
    .row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; gap: 12px; }
    .row > label { font-size: 14px; color: #c8c8cc; flex: 0 0 auto; }

    .seg { display: flex; border: 1px solid rgba(255,255,255,0.14); border-radius: 9px; overflow: hidden; }
    .seg button {
      border: 0; background: transparent; color: #c8c8cc;
      padding: 7px 14px; font-size: 13px; cursor: pointer; transition: background .15s, color .15s;
    }
    .seg button.active { background: #ffd84d; color: #1a1a1c; font-weight: 600; }

    .swatches { display: flex; gap: 8px; }
    .swatches button {
      width: 26px; height: 26px; border-radius: 50%;
      border: 2px solid transparent; cursor: pointer; padding: 0;
      transition: transform .12s;
    }
    .swatches button:hover { transform: scale(1.12); }
    .swatches button.active { border-color: #fff; box-shadow: 0 0 0 2px rgba(255,216,77,0.8); }

    #nameInput, #redeemInput {
      flex: 1 1 auto; min-width: 0;
      background: rgba(255,255,255,0.07); border: 1px solid rgba(255,255,255,0.16);
      border-radius: 8px; color: #fff; padding: 7px 10px; font-size: 13px;
      font-family: inherit; text-align: right;
    }
    #nameInput:focus, #redeemInput:focus { outline: none; border-color: rgba(255,216,77,0.7); }

    #closeBtn {
      width: 100%; margin-top: 8px; padding: 10px;
      border: 0; border-radius: 9px; cursor: pointer;
      background: #ffd84d; color: #1a1a1c; font-size: 14px; font-weight: 600;
      font-family: inherit;
    }
    #closeBtn:hover { background: #ffe070; }

    /* ── Admin map editor ────────────────────────────────────────── */
    #adminPanel {
      position: fixed; top: 64px; right: 12px; z-index: 25;
      width: 220px; max-height: calc(100vh - 80px);
      background: rgba(20,20,24,0.97); color: #f0f0f2;
      border: 1px solid rgba(255,255,255,0.14); border-radius: 14px;
      box-shadow: 0 12px 40px rgba(0,0,0,0.6);
      font-family: -apple-system,"SF Pro Display",system-ui,"Segoe UI",Roboto,Arial,sans-serif;
      display: flex; flex-direction: column; overflow: hidden;
      user-select: none;
    }
    #adminPanel.hidden { display: none; }

    /* Drag handle */
    #adminDragBar {
      display: flex; align-items: center; justify-content: space-between;
      padding: 10px 14px 8px;
      cursor: grab; background: rgba(255,255,255,0.04);
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }
    #adminDragBar:active { cursor: grabbing; }
    #adminTitle { font-size: 14px; font-weight: 700; color: #ffd84d; margin: 0; }
    #adminDragHint { font-size: 10px; color: #555; }

    /* Scrollable body */
    #adminBody { overflow-y: auto; padding: 12px 14px; flex: 1; }
    #adminBody::-webkit-scrollbar { width: 4px; }
    #adminBody::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 2px; }

    /* Collapsible section */
    .admin-section { margin-bottom: 10px; }
    .admin-section-hdr {
      display: flex; align-items: center; justify-content: space-between;
      font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .08em;
      color: #888; cursor: pointer; padding: 4px 0;
      border-bottom: 1px solid rgba(255,255,255,0.06); margin-bottom: 8px;
    }
    .admin-section-hdr .caret { transition: transform .2s; font-size: 9px; color: #666; }
    .admin-section-hdr.collapsed .caret { transform: rotate(-90deg); }
    .admin-section-body { overflow: hidden; transition: max-height .25s ease; }
    .admin-section-body.collapsed { max-height: 0 !important; }

    #brushList { display: grid; grid-template-columns: 1fr 1fr; gap: 5px; }
    #brushList button {
      display: flex; align-items: center; gap: 6px;
      border: 1px solid rgba(255,255,255,0.12); border-radius: 7px;
      background: rgba(255,255,255,0.04); color: #c8c8cc;
      padding: 6px 7px; font-size: 11px; cursor: pointer;
      font-family: inherit; transition: background .12s;
    }
    #brushList button:hover { background: rgba(255,255,255,0.1); }
    #brushList button.active { background: #ffd84d; color: #1a1a1c; border-color: #fff; font-weight: 700; }
    #brushList button .dot { width: 11px; height: 11px; border-radius: 3px; flex: 0 0 auto; border: 1px solid rgba(0,0,0,0.2); }
    #adminHint { font-size: 10px; color: #666; margin: 6px 0 0; line-height: 1.5; }

    /* Inventory editor rows */
    .inv-row { display: flex; align-items: center; gap: 6px; margin-bottom: 5px; }
    .inv-row .inv-icon { font-size: 15px; flex: 0 0 auto; }
    .inv-row input[type=number] {
      flex: 1 1 auto; min-width: 0; background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.14); border-radius: 6px;
      color: #fff; padding: 3px 6px; font-size: 12px; font-family: inherit;
      text-align: right; -moz-appearance: textfield;
    }

    /* Footer buttons */
    #adminFooter { padding: 10px 14px; border-top: 1px solid rgba(255,255,255,0.08); display: flex; flex-direction: column; gap: 6px; }
    #publishBtn {
      width: 100%; padding: 8px; border: 0; border-radius: 8px;
      cursor: pointer; font-size: 12px; font-weight: 600; font-family: inherit;
      background: #4a90d9; color: #fff;
    }
    #publishBtn:hover { background: #5aa0e9; }
    .admin-actions { display: flex; gap: 6px; }
    .admin-actions button {
      flex: 1 1 0; padding: 7px; border: 0; border-radius: 8px; cursor: pointer;
      font-size: 11px; font-weight: 600; font-family: inherit;
    }
    #resetMapBtn { background: rgba(200,60,60,0.85); color: #fff; }
    #resetMapBtn:hover { background: rgba(220,70,70,0.95); }
    #resetAchBtn { background: rgba(180,100,20,0.85); color: #fff; }
    #resetAchBtn:hover { background: rgba(210,120,30,0.95); }
    #resetRichBtn { background: rgba(40,140,60,0.85); color: #fff; width: 100%; }
    #resetRichBtn:hover { background: rgba(50,160,70,0.95); }
    #exitAdminBtn { background: rgba(255,255,255,0.12); color: #f0f0f2; width: 100%; }
    #exitAdminBtn:hover { background: rgba(255,255,255,0.2); }
    .inv-row input[type=number]::-webkit-inner-spin-button { opacity: 1; }
    .inv-row input[type=number]:focus { outline: none; border-color: rgba(255,216,77,0.7); }
    .inv-row span.inv-name { font-size: 11px; color: #c8c8cc; flex: 0 0 58px; }

    /* ── Shop modal ──────────────────────────────────────────────── */
    #shopModal {
      position: fixed; inset: 0; z-index: 30;
      background: rgba(0,0,0,0.45);
      display: flex; align-items: center; justify-content: center;
      font-family: -apple-system,"SF Pro Display",system-ui,"Segoe UI",Roboto,Arial,sans-serif;
    }
    #shopModal.hidden { display: none; }
    #shopPanel {
      width: 300px; max-width: 92vw;
      background: rgba(24,24,27,0.98); color: #f0f0f2;
      border: 1px solid rgba(255,255,255,0.12); border-radius: 16px;
      padding: 20px 22px; box-shadow: 0 16px 50px rgba(0,0,0,0.5);
    }
    #shopPanel h2 { font-size: 17px; margin-bottom: 6px; color: #ffd84d; font-weight: 600; }
    #shopGold { font-size: 12px; color: #a0a0a6; margin-bottom: 14px; }
    .shop-item {
      display: flex; align-items: center; gap: 10px;
      padding: 9px 0; border-bottom: 1px solid rgba(255,255,255,0.07);
    }
    .shop-item:last-of-type { border-bottom: 0; }
    .shop-item .si-icon { font-size: 22px; flex: 0 0 auto; }
    .shop-item .si-info { flex: 1 1 auto; }
    .shop-item .si-name { font-size: 14px; font-weight: 600; }
    .shop-item .si-price { font-size: 12px; color: #ffd84d; margin-top: 1px; }
    .shop-item button {
      padding: 6px 14px; border: 0; border-radius: 8px; cursor: pointer;
      background: #ffd84d; color: #1a1a1c; font-size: 13px; font-weight: 600;
      font-family: inherit; flex: 0 0 auto;
    }
    .shop-item button:disabled { background: rgba(255,255,255,0.12); color: #666; cursor: default; }
    #shopCloseBtn {
      width: 100%; margin-top: 14px; padding: 10px; border: 0; border-radius: 9px;
      cursor: pointer; background: rgba(255,255,255,0.12); color: #f0f0f2;
      font-size: 14px; font-weight: 600; font-family: inherit;
    }
    #shopCloseBtn:hover { background: rgba(255,255,255,0.2); }

    /* ── Cooking modal ───────────────────────────────────────────── */
    #cookModal {
      position: fixed; inset: 0; z-index: 30;
      background: rgba(0,0,0,0.45);
      display: flex; align-items: center; justify-content: center;
      font-family: -apple-system,"SF Pro Display",system-ui,"Segoe UI",Roboto,Arial,sans-serif;
    }
    #cookModal.hidden { display: none; }
    #cookPanel {
      width: 360px; max-width: 94vw; max-height: 84vh; overflow-y: auto;
      background: rgba(24,24,27,0.98); color: #f0f0f2;
      border: 1px solid rgba(255,255,255,0.12); border-radius: 16px;
      padding: 20px 22px; box-shadow: 0 16px 50px rgba(0,0,0,0.5);
    }
    #cookPanel h2 { font-size: 17px; margin-bottom: 14px; color: #ffd84d; font-weight: 600; }
    .recipe-row {
      padding: 10px 0;
      border-bottom: 1px solid rgba(255,255,255,0.07);
    }
    .recipe-row:last-of-type { border-bottom: 0; }
    /* header row: icon · name · (qty + cook) */
    .rr-header {
      display: flex; align-items: center; gap: 8px; margin-bottom: 6px;
    }
    .rr-header .rr-icon { font-size: 20px; flex: 0 0 auto; }
    .rr-header .rr-name { font-size: 13px; font-weight: 600; flex: 1 1 auto; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    /* right-side actions: qty stepper + cook button */
    .rr-acts { display: flex; align-items: center; gap: 6px; flex: 0 0 auto; }
    .rr-acts button.rr-cook { padding: 5px 11px; border: 0; border-radius: 8px;
      cursor: pointer; font-size: 12px; font-weight: 600; font-family: inherit; }
    .rr-acts button.rr-cook:not(:disabled) { background: #ffd84d; color: #1a1a1c; }
    .rr-acts button.rr-cook:disabled { background: rgba(255,255,255,0.1); color: #555; cursor: default; }
    /* ingredient chips row */
    .recipe-row .rr-needs { display: flex; flex-wrap: wrap; gap: 4px; }
    .rr-chip {
      font-size: 11px; padding: 2px 7px; border-radius: 8px;
      background: rgba(255,255,255,0.1); white-space: nowrap;
    }
    .rr-chip.ok  { background: rgba(100,200,100,0.18); color: #90e890; }
    .rr-chip.bad { background: rgba(255,80,80,0.18);   color: #ff9090; }
    #cookCloseBtn {
      width: 100%; margin-top: 14px; padding: 10px; border: 0; border-radius: 9px;
      cursor: pointer; background: rgba(255,255,255,0.12); color: #f0f0f2;
      font-size: 14px; font-weight: 600; font-family: inherit;
    }
    #cookCloseBtn:hover { background: rgba(255,255,255,0.2); }

    /* ── Backpack panel ──────────────────────────────────────────── */
    #bagModal {
      position: fixed; inset: 0; z-index: 30;
      background: rgba(0,0,0,0.45);
      display: flex; align-items: center; justify-content: center;
      font-family: -apple-system,"SF Pro Display",system-ui,"Segoe UI",Roboto,Arial,sans-serif;
    }
    #bagModal.hidden { display: none; }
    #bagPanel {
      width: 340px; max-width: 92vw; max-height: 80vh; overflow-y: auto;
      background: rgba(24,24,27,0.98); color: #f0f0f2;
      border: 1px solid rgba(255,255,255,0.12); border-radius: 16px;
      padding: 20px 22px; box-shadow: 0 16px 50px rgba(0,0,0,0.5);
    }
    #bagPanel h2 { font-size: 17px; margin-bottom: 14px; color: #ffd84d; font-weight: 600; }
    .bag-section { margin-bottom: 14px; }
    .bag-section h3 {
      font-size: 11px; font-weight: 600; text-transform: uppercase;

  <!-- ── Firebase Integration ─────────────────────────────────────── -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-app.js";
    import { getFirestore, doc, setDoc, getDoc, onSnapshot }
      from "https://www.gstatic.com/firebasejs/11.0.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBgU9A-x4kXauDqfu_QLFUunyafPs6mJRo",
      authDomain: "jerrys1stgame.firebaseapp.com",
      projectId: "jerrys1stgame",
      storageBucket: "jerrys1stgame.firebasestorage.app",
      messagingSenderId: "464980408776",
      appId: "1:464980408776:web:62f8f6670abaf08cbe28fd",
      measurementId: "G-5YT054M771"
    };

    const app = initializeApp(firebaseConfig);
    const db  = getFirestore(app);
    const CANON_DOC = doc(db, "gameData", "canonical");

    window.__firebase = {
      // 存入 Firebase（管理员发布地图时调用）
      async saveCanonical(data) {
        try {
          await setDoc(CANON_DOC, { payload: JSON.stringify(data), updatedAt: Date.now() });
          console.log("☁️ Firebase 地图已同步");
          return true;
        } catch (e) {
          console.error("❌ Firebase 存档失败", e);
          return false;
        }
      },
      // 从 Firebase 读取地图（游戏启动时调用）
      async loadCanonical() {
        try {
          const snap = await getDoc(CANON_DOC);
          if (snap.exists()) return JSON.parse(snap.data().payload);
          return null;
        } catch (e) {
          console.error("❌ Firebase 读取失败", e);
          return null;
        }
      },
      // 实时监听：管理员改动后所有玩家自动更新
      listen(callback) {
        onSnapshot(CANON_DOC, snap => {
          if (snap.exists()) {
            try { callback(JSON.parse(snap.data().payload)); } catch (_) {}
          }
        });
      }
    };

    // 通知 game.js Firebase 已就绪
    window.dispatchEvent(new Event("firebaseReady"));
  </script>
