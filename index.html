<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Map Explorer</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #4a7c3f; }
    canvas { display: block; }

    /* ── Settings UI ─────────────────────────────────────────────── */
    #settingsBtn {
      position: fixed; top: 12px; right: 12px; z-index: 20;
      width: 42px; height: 42px; border-radius: 50%;
      border: 1px solid rgba(255,255,255,0.18);
      background: rgba(18,18,20,0.88); color: #ffd84d;
      font-size: 20px; line-height: 1; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: transform .2s, background .2s;
      font-family: -apple-system,"SF Pro Display",system-ui,"Segoe UI",Roboto,Arial,sans-serif;
    }
    #settingsBtn:hover { background: rgba(40,40,44,0.95); transform: rotate(45deg); }

    #settingsModal {
      position: fixed; inset: 0; z-index: 30;
      background: rgba(0,0,0,0.45);
      display: flex; align-items: center; justify-content: center;
      font-family: -apple-system,"SF Pro Display",system-ui,"Segoe UI",Roboto,Arial,sans-serif;
    }
    #settingsModal.hidden { display: none; }

    #settingsPanel {
      width: 320px; max-width: 90vw;
      background: rgba(24,24,27,0.98); color: #f0f0f2;
      border: 1px solid rgba(255,255,255,0.12); border-radius: 16px;
      padding: 20px 22px; box-shadow: 0 16px 50px rgba(0,0,0,0.5);
    }
    #settingsPanel h2 { font-size: 18px; margin-bottom: 16px; color: #ffd84d; font-weight: 600; }
    .row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; gap: 12px; }
    .row > label { font-size: 14px; color: #c8c8cc; flex: 0 0 auto; }

    .seg { display: flex; border: 1px solid rgba(255,255,255,0.14); border-radius: 9px; overflow: hidden; }
    .seg button {
      border: 0; background: transparent; color: #c8c8cc;
      padding: 7px 14px; font-size: 13px; cursor: pointer; transition: background .15s, color .15s;
    }
    .seg button.active { background: #ffd84d; color: #1a1a1c; font-weight: 600; }

    .swatches { display: flex; gap: 8px; }
    .swatches button {
      width: 26px; height: 26px; border-radius: 50%;
      border: 2px solid transparent; cursor: pointer; padding: 0;
      transition: transform .12s;
    }
    .swatches button:hover { transform: scale(1.12); }
    .swatches button.active { border-color: #fff; box-shadow: 0 0 0 2px rgba(255,216,77,0.8); }

    #nameInput {
      flex: 1 1 auto; min-width: 0;
      background: rgba(255,255,255,0.07); border: 1px solid rgba(255,255,255,0.16);
      border-radius: 8px; color: #fff; padding: 7px 10px; font-size: 13px;
      font-family: inherit; text-align: right;
    }
    #nameInput:focus { outline: none; border-color: rgba(255,216,77,0.7); }

    #closeBtn {
      width: 100%; margin-top: 8px; padding: 10px;
      border: 0; border-radius: 9px; cursor: pointer;
      background: #ffd84d; color: #1a1a1c; font-size: 14px; font-weight: 600;
      font-family: inherit;
    }
    #closeBtn:hover { background: #ffe070; }
  </style>
</head>
<body>
  <canvas id="game"></canvas>

  <button id="settingsBtn" title="Settings">⚙</button>

  <div id="settingsModal" class="hidden">
    <div id="settingsPanel">
      <h2 id="stTitle">Settings</h2>

      <div class="row">
        <label id="stGenderLabel">Gender</label>
        <div class="seg" id="genderSeg">
          <button data-gender="male"></button>
          <button data-gender="female"></button>
        </div>
      </div>

      <div class="row">
        <label id="stClothesLabel">Clothes</label>
        <div class="swatches" id="clothesSwatches"></div>
      </div>

      <div class="row">
        <label id="stNameLabel">Name</label>
        <input id="nameInput" type="text" maxlength="12" />
      </div>

      <div class="row">
        <label id="stLangLabel">Language</label>
        <div class="seg" id="langSeg">
          <button data-lang="zh">中文</button>
          <button data-lang="en">English</button>
        </div>
      </div>

      <button id="closeBtn">Close</button>
    </div>
  </div>

  <script src="game.js"></script>
</body>
</html>
